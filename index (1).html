<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow – Task Manager</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app">

    <header>
      <div class="logo">✦ TaskFlow</div>
      <div class="stats">
        <span id="total-count">0 tasks</span>
        <span id="done-count">0 done</span>
      </div>
    </header>

    <main>

      <!-- Add Task Form -->
      <div class="add-box">
        <input type="text" id="task-input" placeholder="Add a new task..." maxlength="100" />
        <button id="add-btn">Add</button>
      </div>

      <!-- Filter Buttons -->
      <div class="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="pending">Pending</button>
        <button class="filter-btn" data-filter="completed">Completed</button>
      </div>

      <!-- Task List -->
      <ul id="task-list"></ul>

      <!-- Empty State -->
      <div class="empty-state" id="empty-state">
        <p>No tasks yet. Add one above! 🚀</p>
      </div>

    </main>

  </div>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <h3>Edit Task</h3>
      <input type="text" id="edit-input" maxlength="100" />
      <div class="modal-btns">
        <button id="cancel-btn">Cancel</button>
        <button id="save-btn">Save</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
